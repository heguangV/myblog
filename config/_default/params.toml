mainSections   = ["post"]
rssFullContent = true
favicon        = "avatar.jpg"

[footer]
    since = 2020

[sidebar]
    avatar   = "huge-avatar.jpg"
    emoji    = "🥺"
    subtitle = "愿做大千世界的一抹尘埃"


[article]
    [article.license]
        enabled = true
        default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    # See complete configuration in config/_default/params.toml
    enabled  = true
    provider = "disqus"

[colorScheme]
    toggle  = false
    default = "light"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true
